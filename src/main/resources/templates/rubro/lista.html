<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Rubros</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/app.css}" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>
<main class="container">
    <div class="page-navigation mb-3">
        <a th:href="@{/}"><i class="bi bi-house"></i> Inicio</a>
        <i class="bi bi-chevron-right"></i>
        <span>Rubros</span>
    </div>

    <div class="page-hero mb-3">
        <div>
            <div class="document-kicker">Itemizado de obra</div>
            <h1>Rubros</h1>
            <div class="text-muted">Estructura de rubros y subrubros para ordenar los items</div>
        </div>
        <div class="d-flex flex-wrap gap-2">
            <a class="btn btn-primary" th:href="@{/rubros/nuevo}"><i class="bi bi-plus-lg"></i> Nuevo rubro</a>
            <form method="post" th:if="${!rubros.isEmpty()}" th:action="@{/rubros/eliminar-todos}" onsubmit="return confirm('Eliminar todos los rubros? Las OC, items, importes y certificaciones se conservaran; los items quedaran sin rubro vinculado.');">
                <button class="btn btn-outline-danger" type="submit"><i class="bi bi-trash"></i> Eliminar todos</button>
            </form>
        </div>
    </div>

    <div class="alert alert-success" th:if="${mensaje}" th:text="${mensaje}"></div>
    <div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>

    <div class="table-responsive">
        <table class="table table-hover align-middle">
            <thead>
            <tr>
                <th>Codigo</th>
                <th>Rubro</th>
                <th>Padre</th>
                <th>Estado</th>
                <th class="text-end">Acciones</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="rubro : ${rubros}">
                <td th:text="${rubro.codigo}"></td>
                <td th:text="${rubro.nombre}"></td>
                <td th:text="${rubro.padre == null ? '-' : rubro.padre.nombreCompleto}"></td>
                <td><span class="status-pill" th:classappend="${rubro.activo ? ' status-done' : ' status-pending'}" th:text="${rubro.activo ? 'Activo' : 'Inactivo'}"></span></td>
                <td class="text-end action-cell">
                    <a class="btn btn-sm btn-outline-secondary table-icon-action" th:href="@{/rubros/{id}/editar(id=${rubro.id})}" title="Editar rubro" aria-label="Editar rubro"><i class="bi bi-pencil-square"></i></a>
                    <form method="post" th:action="@{/rubros/{id}/eliminar(id=${rubro.id})}" onsubmit="return confirm('Eliminar este rubro? Los items se conservaran sin rubro vinculado y los subrubros subiran un nivel.');">
                        <button class="btn btn-sm btn-outline-danger table-icon-action" type="submit" title="Eliminar rubro" aria-label="Eliminar rubro"><i class="bi bi-trash"></i></button>
                    </form>
                </td>
            </tr>
            <tr th:if="${rubros.isEmpty()}"><td colspan="5" class="text-center text-muted py-4">No hay rubros cargados.</td></tr>
            </tbody>
        </table>
    </div>
</main>
</body>
</html>
