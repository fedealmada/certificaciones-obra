<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Inicio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/app.css}" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>
<main class="container">
    <section class="home-hero mb-4">
        <div class="home-hero-copy">
            <div class="home-hero-topline">
                <div>
                    <div class="document-kicker">Centro de obra</div>
                    <h1>ObraControl</h1>
                </div>
                <span class="home-status-pill"><i class="bi bi-lightning-charge-fill"></i> Panel activo</span>
            </div>
            <p>Accede rapido a compras, certificaciones, materiales, reportes e itemizado desde un solo lugar.</p>
            <div class="home-hero-actions">
                <a class="btn btn-primary" th:if="${configuracion.activo('modulo.oc')}" th:href="@{/oc/nueva}"><i class="bi bi-plus-lg"></i> Nueva OC</a>
                <a class="btn btn-outline-secondary" th:if="${configuracion.activo('modulo.importarCertificados')}" th:href="@{/certificaciones/importar}"><i class="bi bi-clipboard-check"></i> Importar certificados</a>
            </div>
        </div>
        <div class="home-hero-stats">
            <div><span>OC</span><strong th:text="${reporte.cantidadOrdenes}">0</strong></div>
            <div><span>Certificados</span><strong th:text="${reporte.cantidadCertificaciones}">0</strong></div>
            <div><span>Avance</span><strong th:text="${reporte.porcentajeCertificado} + '%'">0%</strong></div>
        </div>
    </section>

    <section class="home-module-grid">
        <a class="home-module-card" th:each="modulo, iter : ${modulos}" th:href="${modulo.url()}" th:classappend="${' is-' + modulo.tono()}" th:style="${'animation-delay: ' + (iter.index * 55) + 'ms'}">
            <span class="home-module-orbit">
                <span class="home-module-icon"><i th:class="${'bi ' + modulo.icono()}"></i></span>
            </span>
            <span class="home-module-content">
                <strong th:text="${modulo.nombre()}">Modulo</strong>
                <small th:text="${modulo.descripcion()}">Descripcion</small>
            </span>
            <i class="bi bi-arrow-up-right home-module-arrow"></i>
        </a>
        <a class="home-module-card is-settings" th:href="@{/configuracion}" th:style="${'animation-delay: ' + (modulos.size() * 55) + 'ms'}">
            <span class="home-module-orbit">
                <span class="home-module-icon"><i class="bi bi-sliders"></i></span>
            </span>
            <span class="home-module-content">
                <strong>Configuracion</strong>
                <small>Activar modulos, alertas y comportamiento visual.</small>
            </span>
            <i class="bi bi-arrow-up-right home-module-arrow"></i>
        </a>
    </section>
</main>
</body>
</html>
