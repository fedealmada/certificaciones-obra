<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Obras</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script>
    (() => {
        const savedTheme = localStorage.getItem('obraControl.theme');
        const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        document.documentElement.dataset.theme = savedTheme || (prefersDark ? 'dark' : 'light');
    })();
    </script>
    <link th:href="@{/css/app.css}" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>
<main class="container">
    <div class="page-navigation mb-3">
        <a th:href="@{/}"><i class="bi bi-house"></i> Inicio</a>
        <i class="bi bi-chevron-right"></i>
        <span>Obras</span>
    </div>

    <div class="document-header mb-4">
        <div>
            <div class="document-kicker">Contexto de trabajo</div>
            <h1>Obras</h1>
            <div class="text-muted">Selecciona la obra activa o prepara una nueva obra para trabajar.</div>
        </div>
        <div class="document-actions">
            <span class="section-total-pill" th:text="${'Activa: ' + obraActiva.nombre}">Activa</span>
        </div>
    </div>

    <div class="alert alert-success" th:if="${success}" th:text="${success}"></div>
    <div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>

    <div class="obra-layout">
        <section class="panel-section">
            <div class="section-title-row">
                <h2 class="h5 mb-0"><i class="bi bi-building-add"></i> <span th:text="${obra.id == null ? 'Nueva obra' : 'Editar obra'}">Nueva obra</span></h2>
            </div>
            <form method="post" th:action="@{/obras}" th:object="${obra}">
                <input type="hidden" th:field="*{id}">
                <div class="row g-3">
                    <div class="col-12">
                        <label class="form-label">Nombre</label>
                        <input class="form-control" th:field="*{nombre}" placeholder="Terrazas de Quilmes" required>
                    </div>
                    <div class="col-12">
                        <label class="form-label">Ubicacion</label>
                        <input class="form-control" th:field="*{ubicacion}" placeholder="Quilmes">
                    </div>
                    <div class="col-12">
                        <label class="form-label">Cliente</label>
                        <input class="form-control" th:field="*{cliente}" placeholder="Cliente o comitente">
                    </div>
                    <div class="col-12">
                        <label class="form-label">Estado</label>
                        <select class="form-select" th:field="*{activa}">
                            <option value="true">Activa</option>
                            <option value="false">Inactiva</option>
                        </select>
                    </div>
                </div>
                <div class="d-flex gap-2 mt-3">
                    <button class="btn btn-primary" type="submit"><i class="bi bi-save"></i> Guardar y usar</button>
                    <a class="btn btn-outline-secondary" th:if="${obra.id != null}" th:href="@{/obras}">Cancelar</a>
                </div>
            </form>
        </section>

        <section class="panel-section">
            <div class="section-title-row">
                <h2 class="h5 mb-0"><i class="bi bi-buildings"></i> Obras cargadas</h2>
                <span class="section-total-pill" th:text="${obras.size()} + ' obras'">0 obras</span>
            </div>
            <div class="table-responsive">
                <table class="table table-hover align-middle document-table">
                    <thead><tr><th>Obra</th><th>Ubicacion</th><th>Cliente</th><th>Estado</th><th class="text-end">Acciones</th></tr></thead>
                    <tbody>
                    <tr th:each="obraFila : ${obras}">
                        <td><strong th:text="${obraFila.nombre}">Obra</strong></td>
                        <td th:text="${obraFila.ubicacion ?: '-'}">Ubicacion</td>
                        <td th:text="${obraFila.cliente ?: '-'}">Cliente</td>
                        <td>
                            <span class="delivery-status-pill"
                                  th:classappend="${obraFila.id.equals(obraActiva.id) ? ' is-complete' : (obraFila.activa ? ' is-partial' : ' is-record-only')}"
                                  th:text="${obraFila.id.equals(obraActiva.id) ? 'ACTIVA AHORA' : (obraFila.activa ? 'DISPONIBLE' : 'INACTIVA')}">Estado</span>
                        </td>
                        <td class="text-end action-cell">
                            <form method="post" th:if="${obraFila.activa && !obraFila.id.equals(obraActiva.id)}" th:action="@{/obras/{id}/seleccionar(id=${obraFila.id})}">
                                <button class="btn btn-sm btn-outline-primary table-icon-action" type="submit" title="Usar obra" aria-label="Usar obra"><i class="bi bi-check2-circle"></i></button>
                            </form>
                            <a class="btn btn-sm btn-outline-secondary table-icon-action" th:href="@{/obras/{id}/editar(id=${obraFila.id})}" title="Editar obra" aria-label="Editar obra"><i class="bi bi-pencil-square"></i></a>
                        </td>
                    </tr>
                    <tr th:if="${obras.isEmpty()}"><td colspan="5" class="text-center text-muted py-4">Todavia no hay obras cargadas.</td></tr>
                    </tbody>
                </table>
            </div>
        </section>
    </div>
</main>
</body>
</html>
