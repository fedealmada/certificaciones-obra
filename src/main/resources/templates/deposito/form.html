<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Insumo de deposito</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script>
    (() => {
        const savedTheme = localStorage.getItem('obraControl.theme');
        const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        document.documentElement.dataset.theme = savedTheme || (prefersDark ? 'dark' : 'light');
    })();
    </script>
    <link th:href="@{/css/app.css}" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>
<main class="container">
    <div class="page-navigation mb-3">
        <a th:href="@{/}"><i class="bi bi-house"></i> Inicio</a>
        <i class="bi bi-chevron-right"></i>
        <a th:href="@{/deposito}">Deposito</a>
        <i class="bi bi-chevron-right"></i>
        <span th:text="${item.id == null ? 'Nuevo insumo' : 'Editar insumo'}">Insumo</span>
    </div>

    <div class="document-header mb-4">
        <div>
            <div class="document-kicker">Panol</div>
            <h1 th:text="${item.id == null ? 'Nuevo insumo' : 'Editar insumo'}">Insumo</h1>
            <div class="text-muted">Define el insumo del deposito. El stock se modifica desde movimientos.</div>
        </div>
    </div>
    <div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>
    <form method="post" th:action="@{/deposito/items}" th:object="${item}">
        <input type="hidden" th:field="*{id}">
        <div class="panel-section">
            <div class="row g-3">
                <div class="col-md-5"><label class="form-label">Nombre</label><input class="form-control" th:field="*{nombre}" required placeholder="Pincel, pintura, disco, casco"></div>
                <div class="col-md-3"><label class="form-label">Tipo</label><select class="form-select" th:field="*{tipo}"><option th:each="tipo : ${tipos}" th:value="${tipo}" th:text="${tipo.descripcion}"></option></select></div>
                <div class="col-md-2"><label class="form-label">Unidad</label><input class="form-control" th:field="*{unidad}" placeholder="u, lts, kg"></div>
                <div class="col-md-2"><label class="form-label">Activo</label><select class="form-select" th:field="*{activo}"><option value="true">Si</option><option value="false">No</option></select></div>
                <div class="col-md-4"><label class="form-label">Categoria</label><input class="form-control" th:field="*{categoria}" placeholder="Pintura, herramientas, EPP"></div>
                <div class="col-md-4"><label class="form-label">Ubicacion</label><input class="form-control" th:field="*{ubicacion}" placeholder="Estante A, deposito 1"></div>
                <div class="col-md-4"><label class="form-label">Stock minimo</label><input class="form-control" type="number" step="0.01" min="0" th:field="*{stockMinimo}"></div>
                <div class="col-12"><label class="form-label">Observacion</label><textarea class="form-control" rows="3" th:field="*{observacion}" placeholder="Datos utiles para el panol"></textarea></div>
            </div>
        </div>
        <div class="d-flex gap-2 mt-3">
            <button class="btn btn-primary" type="submit"><i class="bi bi-save"></i> Guardar</button>
            <a class="btn btn-outline-secondary" th:href="@{/deposito}">Cancelar</a>
        </div>
    </form>
</main>
</body>
</html>
