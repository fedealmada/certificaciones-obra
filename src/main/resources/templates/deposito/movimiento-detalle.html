<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Detalle movimiento</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script>
    (() => {
        const savedTheme = localStorage.getItem('obraControl.theme');
        const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        document.documentElement.dataset.theme = savedTheme || (prefersDark ? 'dark' : 'light');
    })();
    </script>
    <link th:href="@{/css/app.css}" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>
<main class="container">
    <div class="page-navigation mb-3">
        <a th:href="@{/}"><i class="bi bi-house"></i> Inicio</a>
        <i class="bi bi-chevron-right"></i>
        <a th:href="@{/deposito}">Deposito</a>
        <i class="bi bi-chevron-right"></i>
        <span>Movimiento</span>
    </div>

    <div class="document-header mb-4">
        <div>
            <div class="document-kicker">Movimiento de deposito</div>
            <h1 th:text="${movimiento.item.nombre}">Insumo</h1>
            <div class="text-muted" th:text="${#temporals.format(movimiento.fecha, 'dd/MM/yyyy') + ' / ' + movimiento.tipo.descripcion}">Movimiento</div>
        </div>
        <div class="document-actions">
            <a class="btn btn-outline-secondary" th:href="@{/deposito/{id}/movimiento(id=${movimiento.item.id})}"><i class="bi bi-clock-history"></i> Historial</a>
            <a class="btn btn-outline-primary" th:if="${movimiento.ordenCompraId == null && movimiento.movimientoOrigenId == null}" th:href="@{/deposito/movimientos/{id}/editar(id=${movimiento.id})}"><i class="bi bi-pencil-square"></i> Editar</a>
            <a class="btn btn-success" th:if="${movimiento.requiereDevolucion && !movimiento.devuelto}" th:href="@{/deposito/movimientos/{id}/devolver(id=${movimiento.id})}"><i class="bi bi-arrow-return-left"></i> Devolver</a>
        </div>
    </div>

    <section class="panel-section">
        <div class="cert-meta-grid">
            <div><span>Tipo</span><strong th:text="${movimiento.tipo.descripcion}">Tipo</strong></div>
            <div><span>Cantidad</span><strong th:text="${#numbers.formatDecimal(movimiento.cantidad, 1, 'POINT', 2, 'COMMA')}">0,00</strong></div>
            <div><span>Stock anterior</span><strong th:text="${#numbers.formatDecimal(movimiento.stockAnterior, 1, 'POINT', 2, 'COMMA')}">0,00</strong></div>
            <div><span>Stock resultante</span><strong th:text="${#numbers.formatDecimal(movimiento.stockResultante, 1, 'POINT', 2, 'COMMA')}">0,00</strong></div>
            <div><span>Trabajador</span><strong th:text="${movimiento.trabajadorNombre ?: '-'}">-</strong></div>
            <div><span>Responsable</span><strong th:text="${movimiento.responsable ?: '-'}">-</strong></div>
            <div><span>Destino</span><strong th:text="${movimiento.destino ?: '-'}">-</strong></div>
            <div><span>Origen</span><strong th:text="${movimiento.ordenCompraNumero == null ? '-' : 'OC ' + movimiento.ordenCompraNumero}">-</strong></div>
            <div><span>Devolucion</span><strong th:text="${movimiento.requiereDevolucion ? (movimiento.devuelto ? 'Devuelto' : 'Pendiente') : 'No aplica'}">No aplica</strong></div>
        </div>
        <div class="ticket-note cert-observation mt-3" th:if="${movimiento.observacion}">
            <span>Observacion</span>
            <strong th:text="${movimiento.observacion}">Observacion</strong>
        </div>
    </section>
</main>
</body>
</html>
