<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Registrar devolucion</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script>
    (() => {
        const savedTheme = localStorage.getItem('obraControl.theme');
        const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        document.documentElement.dataset.theme = savedTheme || (prefersDark ? 'dark' : 'light');
    })();
    </script>
    <link th:href="@{/css/app.css}" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>
<main class="container">
    <div class="page-navigation mb-3">
        <a th:href="@{/}"><i class="bi bi-house"></i> Inicio</a>
        <i class="bi bi-chevron-right"></i>
        <a th:href="@{/deposito}">Deposito</a>
        <i class="bi bi-chevron-right"></i>
        <span>Devolucion</span>
    </div>

    <div class="document-header mb-4">
        <div>
            <div class="document-kicker">Devolucion pendiente</div>
            <h1 th:text="${movimiento.item.nombre}">Insumo</h1>
            <div class="text-muted" th:text="${'Prestado a ' + (movimiento.trabajadorNombre ?: (movimiento.responsable ?: '-'))}">Persona</div>
        </div>
    </div>
    <div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>

    <section class="cert-detail-summary mb-4">
        <div><span>Fecha salida</span><strong th:text="${#temporals.format(movimiento.fecha, 'dd/MM/yyyy')}">01/01/2026</strong></div>
        <div><span>Cantidad</span><strong th:text="${#numbers.formatDecimal(movimiento.cantidad, 1, 'POINT', 2, 'COMMA')}">0,00</strong></div>
        <div><span>Persona</span><strong th:text="${movimiento.trabajadorNombre ?: (movimiento.responsable ?: '-')}">-</strong></div>
        <div><span>Destino</span><strong th:text="${movimiento.destino ?: '-'}">-</strong></div>
    </section>

    <form method="post" th:action="@{/deposito/movimientos/{id}/devolver(id=${movimiento.id})}" th:object="${form}">
        <section class="panel-section mb-3">
            <div class="row g-3">
                <div class="col-md-3"><label class="form-label">Fecha devolucion</label><input class="form-control" type="date" th:field="*{fecha}" required></div>
                <div class="col-md-3"><label class="form-label">Cantidad</label><input class="form-control" type="number" step="0.01" th:field="*{cantidad}" readonly></div>
                <div class="col-md-3"><label class="form-label">Responsable</label><input class="form-control" th:field="*{responsable}" placeholder="Quien recibe"></div>
                <div class="col-md-3"><label class="form-label">Trabajador</label><select class="form-select" th:field="*{trabajadorId}"><option value="">Sin trabajador</option><option th:each="trabajador : ${trabajadores}" th:value="${trabajador.id}" th:text="${trabajador.nombre}">Trabajador</option></select></div>
                <div class="col-12"><label class="form-label">Observacion</label><input class="form-control" th:field="*{observacion}" placeholder="Estado, detalle o aclaracion"></div>
            </div>
        </section>
        <div class="d-flex gap-2">
            <button class="btn btn-success" type="submit"><i class="bi bi-arrow-return-left"></i> Registrar devolucion</button>
            <a class="btn btn-outline-secondary" th:href="@{/deposito}">Cancelar</a>
        </div>
    </form>
</main>
</body>
</html>
