<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Personas de panol</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script>
    (() => {
        const savedTheme = localStorage.getItem('obraControl.theme');
        const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        document.documentElement.dataset.theme = savedTheme || (prefersDark ? 'dark' : 'light');
    })();
    </script>
    <link th:href="@{/css/app.css}" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>
<main class="container">
    <div class="page-navigation mb-3">
        <a th:href="@{/}"><i class="bi bi-house"></i> Inicio</a>
        <i class="bi bi-chevron-right"></i>
        <a th:href="@{/deposito}">Deposito</a>
        <i class="bi bi-chevron-right"></i>
        <span>Personas</span>
    </div>

    <div class="document-header mb-4">
        <div>
            <div class="document-kicker">Panol</div>
            <h1>Personas y trabajadores</h1>
            <div class="text-muted">Registro de quienes retiran, reciben o devuelven insumos del deposito.</div>
        </div>
        <div class="document-actions">
            <a class="btn btn-outline-secondary" th:href="@{/deposito}"><i class="bi bi-boxes"></i> Volver al deposito</a>
        </div>
    </div>

    <div class="alert alert-success" th:if="${success}" th:text="${success}"></div>
    <div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>

    <div class="deposito-people-layout">
        <section class="panel-section">
            <div class="section-title-row">
                <h2 class="h5 mb-0"><i class="bi bi-person-plus"></i> <span th:text="${persona.id == null ? 'Nueva persona' : 'Editar persona'}">Nueva persona</span></h2>
            </div>
            <form method="post" th:action="@{/deposito/personas}" th:object="${persona}">
                <input type="hidden" th:field="*{id}">
                <div class="row g-3">
                    <div class="col-12">
                        <label class="form-label">Nombre</label>
                        <input class="form-control" th:field="*{nombre}" placeholder="Ej: Juan Carlos" required>
                    </div>
                    <div class="col-12">
                        <label class="form-label">Sector / funcion</label>
                        <input class="form-control" th:field="*{sector}" placeholder="Pintura, mantenimiento, electricidad">
                    </div>
                    <div class="col-12">
                        <label class="form-label">Empresa</label>
                        <input class="form-control" th:field="*{empresa}" placeholder="Empresa contratista o cuadrilla">
                    </div>
                    <div class="col-12">
                        <label class="form-label">Estado</label>
                        <select class="form-select" th:field="*{activo}">
                            <option value="true">Activa</option>
                            <option value="false">Inactiva</option>
                        </select>
                    </div>
                </div>
                <div class="d-flex gap-2 mt-3">
                    <button class="btn btn-primary" type="submit"><i class="bi bi-save"></i> Guardar</button>
                    <a class="btn btn-outline-secondary" th:if="${persona.id != null}" th:href="@{/deposito/personas}">Cancelar</a>
                </div>
            </form>
        </section>

        <section class="panel-section">
            <div class="section-title-row">
                <h2 class="h5 mb-0"><i class="bi bi-people"></i> Registro</h2>
                <span class="section-total-pill" th:text="${personas.size()} + ' personas'">0 personas</span>
            </div>
            <div class="table-responsive">
                <table class="table table-hover align-middle document-table">
                    <thead><tr><th>Nombre</th><th>Empresa</th><th>Sector</th><th>Estado</th><th class="text-end">Acciones</th></tr></thead>
                    <tbody>
                    <tr th:each="personaFila : ${personas}">
                        <td><strong th:text="${personaFila.nombre}">Persona</strong></td>
                        <td th:text="${personaFila.empresa ?: '-'}">Empresa</td>
                        <td th:text="${personaFila.sector ?: '-'}">Sector</td>
                        <td>
                            <span class="delivery-status-pill"
                                  th:classappend="${personaFila.activo ? ' is-complete' : ' is-record-only'}"
                                  th:text="${personaFila.activo ? 'ACTIVA' : 'INACTIVA'}">ACTIVA</span>
                        </td>
                        <td class="text-end action-cell">
                            <a class="btn btn-sm btn-outline-secondary table-icon-action" th:href="@{/deposito/personas/{id}/editar(id=${personaFila.id})}" title="Editar persona" aria-label="Editar persona"><i class="bi bi-pencil-square"></i></a>
                            <form method="post" th:if="${personaFila.activo}" th:action="@{/deposito/personas/{id}/desactivar(id=${personaFila.id})}" onsubmit="return confirm('Desactivar esta persona?');">
                                <button class="btn btn-sm btn-outline-danger table-icon-action" type="submit" title="Desactivar persona" aria-label="Desactivar persona"><i class="bi bi-person-dash"></i></button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${personas.isEmpty()}"><td colspan="5" class="text-center text-muted py-4">Todavia no hay personas cargadas.</td></tr>
                    </tbody>
                </table>
            </div>
        </section>
    </div>
</main>
</body>
</html>
