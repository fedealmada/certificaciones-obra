<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Proveedores</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/app.css}" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>
<main class="container">
    <div class="page-navigation mb-3">
        <a th:href="@{/}"><i class="bi bi-house"></i> Inicio</a>
        <i class="bi bi-chevron-right"></i>
        <span>Proveedores</span>
    </div>

    <div class="page-hero mb-3">
        <div>
            <div class="document-kicker">Contratistas y contactos</div>
            <h1>Proveedores</h1>
            <div class="text-muted">Listado de proveedores vinculados a ordenes de compra.</div>
        </div>
        <a class="btn btn-primary" th:href="@{/proveedores/nuevo}"><i class="bi bi-plus-lg"></i> Nuevo proveedor</a>
    </div>
    <div class="table-responsive"><table class="table table-hover align-middle">
        <thead><tr><th>Nombre</th><th>CUIT</th><th>Contacto</th><th>Telefono</th><th>Email</th><th>Estado</th><th class="text-end">Acciones</th></tr></thead>
        <tbody>
        <tr th:each="proveedor : ${proveedores}">
            <td th:text="${proveedor.nombre}"></td>
            <td th:text="${proveedor.cuit}"></td>
            <td th:text="${proveedor.contacto}"></td>
            <td th:text="${proveedor.telefono}"></td>
            <td th:text="${proveedor.email}"></td>
            <td><span class="status-pill" th:classappend="${proveedor.activo ? ' status-done' : ' status-pending'}" th:text="${proveedor.activo ? 'Activo' : 'Inactivo'}"></span></td>
            <td class="text-end action-cell"><a class="btn btn-sm btn-outline-primary table-icon-action" th:href="@{/proveedores/{id}(id=${proveedor.id})}" title="Ver proveedor" aria-label="Ver proveedor"><i class="bi bi-eye"></i></a><a class="btn btn-sm btn-outline-secondary table-icon-action" th:href="@{/proveedores/{id}/editar(id=${proveedor.id})}" title="Editar proveedor" aria-label="Editar proveedor"><i class="bi bi-pencil-square"></i></a><form method="post" th:action="@{/proveedores/{id}/eliminar(id=${proveedor.id})}" onsubmit="return confirm('Eliminar este proveedor? Si tiene OC asociadas quedara inactivo.');"><button class="btn btn-sm btn-outline-danger table-icon-action" type="submit" title="Eliminar proveedor" aria-label="Eliminar proveedor"><i class="bi bi-trash"></i></button></form></td>
        </tr>
        <tr th:if="${proveedores.isEmpty()}"><td colspan="7" class="text-center text-muted py-4">No hay proveedores cargados.</td></tr>
        </tbody>
    </table></div>
</main>
</body>
</html>
