<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Detalle Proveedor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/app.css}" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>
<main class="container">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <div><h1 th:text="${proveedor.nombre}">Proveedor</h1><div class="text-muted" th:text="${proveedor.cuit}"></div></div>
        <a class="btn btn-outline-secondary" th:href="@{/proveedores/{id}/editar(id=${proveedor.id})}">Editar</a>
    </div>
    <div class="row g-3 mb-4">
        <div class="col-md-3"><div class="metric-card"><div class="metric-label">Contacto</div><div class="metric-value metric-value-sm" th:text="${proveedor.contacto ?: '-'}">-</div></div></div>
        <div class="col-md-3"><div class="metric-card"><div class="metric-label">Telefono</div><div class="metric-value metric-value-sm" th:text="${proveedor.telefono ?: '-'}">-</div></div></div>
        <div class="col-md-3"><div class="metric-card"><div class="metric-label">Email</div><div class="metric-value metric-value-sm" th:text="${proveedor.email ?: '-'}">-</div></div></div>
        <div class="col-md-3"><div class="metric-card"><div class="metric-label">OC asociadas</div><div class="metric-value metric-value-sm" th:text="${ordenes.size()}">0</div></div></div>
    </div>

    <section><h2 class="h4">Ordenes de Compra</h2><div class="table-responsive"><table class="table table-hover align-middle">
        <thead><tr><th>Numero</th><th>Fecha</th><th>Items</th><th>Observacion</th><th class="text-end">Acciones</th></tr></thead>
        <tbody>
        <tr th:each="orden : ${ordenes}">
            <td th:text="${orden.numero}"></td>
            <td th:text="${#temporals.format(orden.fecha, 'dd/MM/yyyy')}"></td>
            <td th:text="${orden.items.size()}"></td>
            <td th:text="${orden.observacion}"></td>
            <td class="text-end action-cell">
                <a class="btn btn-sm btn-outline-primary table-icon-action" th:href="@{/oc/{id}(id=${orden.id})}" title="Abrir OC" aria-label="Abrir OC"><i class="bi bi-box-arrow-up-right"></i></a>
            </td>
        </tr>
        <tr th:if="${ordenes.isEmpty()}"><td colspan="5" class="text-center text-muted py-4">Este proveedor todavia no tiene ordenes asociadas.</td></tr>
        </tbody>
    </table></div></section>
</main>
</body>
</html>
