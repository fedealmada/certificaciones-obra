<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Proveedor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/app.css}" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>
<main class="container">
    <div class="page-navigation mb-3">
        <a th:href="@{/}"><i class="bi bi-house"></i> Inicio</a>
        <i class="bi bi-chevron-right"></i>
        <a th:href="@{/proveedores}">Proveedores</a>
        <i class="bi bi-chevron-right"></i>
        <span th:text="${proveedor.id == null ? 'Nuevo proveedor' : 'Editar proveedor'}">Proveedor</span>
    </div>

    <div class="document-header mb-4">
        <div>
            <div class="document-kicker">Ficha de proveedor</div>
            <h1 th:text="${proveedor.id == null ? 'Nuevo proveedor' : 'Editar proveedor'}">Proveedor</h1>
            <div class="text-muted">Datos comerciales y de contacto del proveedor.</div>
        </div>
    </div>
    <div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>
    <form method="post" th:action="@{/proveedores}" th:object="${proveedor}">
        <input type="hidden" th:field="*{id}">
        <div class="row g-3 mb-4">
            <div class="col-md-6"><label class="form-label">Nombre</label><input class="form-control" th:field="*{nombre}" required></div>
            <div class="col-md-3"><label class="form-label">CUIT</label><input class="form-control" th:field="*{cuit}"></div>
            <div class="col-md-3"><label class="form-label">Activo</label><select class="form-select" th:field="*{activo}"><option value="true">Si</option><option value="false">No</option></select></div>
            <div class="col-md-4"><label class="form-label">Contacto</label><input class="form-control" th:field="*{contacto}"></div>
            <div class="col-md-4"><label class="form-label">Telefono</label><input class="form-control" th:field="*{telefono}"></div>
            <div class="col-md-4"><label class="form-label">Email</label><input class="form-control" type="email" th:field="*{email}"></div>
            <div class="col-12"><label class="form-label">Observacion</label><textarea class="form-control" rows="3" th:field="*{observacion}"></textarea></div>
        </div>
        <div class="d-flex gap-2"><button class="btn btn-primary" type="submit">Guardar</button><a class="btn btn-outline-secondary" th:href="@{/proveedores}">Cancelar</a></div>
    </form>
</main>
</body>
</html>
