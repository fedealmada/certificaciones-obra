<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Categorias</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script>
    (() => {
        const savedTheme = localStorage.getItem('obraControl.theme');
        const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        document.documentElement.dataset.theme = savedTheme || (prefersDark ? 'dark' : 'light');
    })();
    </script>
    <link th:href="@{/css/app.css}" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>
<main class="container">
    <div class="page-navigation mb-3">
        <a th:href="@{/}"><i class="bi bi-house"></i> Inicio</a>
        <i class="bi bi-chevron-right"></i>
        <span>Categorias</span>
    </div>

    <div class="page-hero mb-3">
        <div>
            <div class="document-kicker">Clasificacion</div>
            <h1>Categorias</h1>
            <div class="text-muted">Definen como se clasifican los items de una orden de compra.</div>
        </div>
        <a class="btn btn-primary" th:href="@{/categorias/nueva}"><i class="bi bi-plus-lg"></i> Nueva categoria</a>
    </div>
    <div class="table-responsive">
        <table class="table table-hover align-middle">
            <thead><tr><th>Nombre</th><th>Comportamiento</th><th>Estado</th><th class="text-end">Acciones</th></tr></thead>
            <tbody>
            <tr th:each="categoria : ${categorias}">
                <td th:text="${categoria.nombre}"></td>
                <td th:text="${categoria.tipo.descripcion}"></td>
                <td><span class="status-pill" th:classappend="${categoria.activo ? ' status-done' : ' status-pending'}" th:text="${categoria.activo ? 'Activa' : 'Inactiva'}"></span></td>
                <td class="text-end action-cell">
                    <a class="btn btn-sm btn-outline-secondary table-icon-action" th:href="@{/categorias/{id}/editar(id=${categoria.id})}" title="Editar categoria" aria-label="Editar categoria"><i class="bi bi-pencil-square"></i></a>
                    <form method="post" th:action="@{/categorias/{id}/eliminar(id=${categoria.id})}" onsubmit="return confirm('Eliminar esta categoria? Si tiene OC asociadas quedara inactiva.');">
                        <button class="btn btn-sm btn-outline-danger table-icon-action" type="submit" title="Eliminar categoria" aria-label="Eliminar categoria"><i class="bi bi-trash"></i></button>
                    </form>
                </td>
            </tr>
            <tr th:if="${categorias.isEmpty()}"><td colspan="4" class="text-center text-muted py-4">No hay categorias cargadas.</td></tr>
            </tbody>
        </table>
    </div>
</main>
</body>
</html>
