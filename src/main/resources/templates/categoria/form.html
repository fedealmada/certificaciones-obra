<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Categoria</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script>
    (() => {
        const savedTheme = localStorage.getItem('obraControl.theme');
        const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        document.documentElement.dataset.theme = savedTheme || (prefersDark ? 'dark' : 'light');
    })();
    </script>
    <link th:href="@{/css/app.css}" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>
<main class="container">
    <div class="page-navigation mb-3">
        <a th:href="@{/}"><i class="bi bi-house"></i> Inicio</a>
        <i class="bi bi-chevron-right"></i>
        <a th:href="@{/categorias}">Categorias</a>
        <i class="bi bi-chevron-right"></i>
        <span th:text="${categoria.id == null ? 'Nueva categoria' : 'Editar categoria'}">Categoria</span>
    </div>

    <div class="document-header mb-4">
        <div>
            <div class="document-kicker">Clasificacion</div>
            <h1 th:text="${categoria.id == null ? 'Nueva categoria' : 'Editar categoria'}">Categoria</h1>
            <div class="text-muted">Configura como se agrupan los items dentro de las OC.</div>
        </div>
    </div>
    <div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>
    <form method="post" th:action="@{/categorias}" th:object="${categoria}">
        <input type="hidden" th:field="*{id}">
        <div class="row g-3 mb-4">
            <div class="col-md-5"><label class="form-label">Nombre</label><input class="form-control" th:field="*{nombre}" required></div>
            <div class="col-md-4">
                <label class="form-label">Comportamiento</label>
                <select class="form-select" th:field="*{tipo}">
                    <option th:each="tipo : ${tipos}" th:value="${tipo}" th:text="${tipo.descripcion}"></option>
                </select>
            </div>
            <div class="col-md-3"><label class="form-label">Estado</label><select class="form-select" th:field="*{activo}"><option value="true">Activa</option><option value="false">Inactiva</option></select></div>
        </div>
        <div class="d-flex gap-2"><button class="btn btn-primary" type="submit">Guardar</button><a class="btn btn-outline-secondary" th:href="@{/categorias}">Cancelar</a></div>
    </form>
</main>
</body>
</html>
