<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Configuracion</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/app.css}" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>
<main class="container">
    <div class="page-navigation mb-3">
        <a th:href="@{/}"><i class="bi bi-house"></i> Inicio</a>
        <i class="bi bi-chevron-right"></i>
        <span>Configuracion</span>
    </div>

    <div class="page-hero mb-3">
        <div>
            <div class="document-kicker">Preferencias del sistema</div>
            <h1>Configuracion</h1>
            <div class="text-muted">Activa o desactiva modulos visibles y alertas operativas.</div>
        </div>
    </div>

    <div class="alert alert-success" th:if="${mensaje}" th:text="${mensaje}"></div>

    <form method="post" th:action="@{/configuracion}">
        <section class="panel-section mb-3">
            <div class="section-title-row">
                <h2 class="h5 mb-0"><i class="bi bi-grid-1x2"></i> Modulos visibles</h2>
                <span class="section-total-pill" th:text="${modulos.size()} + ' modulos'">0 modulos</span>
            </div>
            <div class="settings-grid">
                <label class="setting-toggle" th:each="modulo : ${modulos}">
                    <span class="setting-toggle-icon"><i th:class="${'bi ' + modulo.icono()}"></i></span>
                    <span><strong th:text="${modulo.nombre()}">Modulo</strong><small th:text="${modulo.descripcion()}">Descripcion</small></span>
                    <input type="checkbox" th:name="${modulo.clave()}" th:checked="${valores.get(modulo.clave())}">
                    <span class="setting-switch"></span>
                </label>
            </div>
        </section>

        <section class="panel-section mb-3">
            <div class="section-title-row">
                <h2 class="h5 mb-0"><i class="bi bi-shield-exclamation"></i> Alertas</h2>
            </div>
            <div class="settings-grid settings-grid-small">
                <label class="setting-toggle">
                    <span class="setting-toggle-icon"><i class="bi bi-speedometer2"></i></span>
                    <span><strong>Alertas en Dashboard</strong><small>Muestra tarjetas de control en el dashboard.</small></span>
                    <input type="checkbox" name="alertas.dashboard" th:checked="${valores.get('alertas.dashboard')}">
                    <span class="setting-switch"></span>
                </label>
                <label class="setting-toggle">
                    <span class="setting-toggle-icon"><i class="bi bi-receipt"></i></span>
                    <span><strong>Alertas en OC</strong><small>Muestra alertas dentro del detalle de cada orden de compra.</small></span>
                    <input type="checkbox" name="alertas.oc" th:checked="${valores.get('alertas.oc')}">
                    <span class="setting-switch"></span>
                </label>
            </div>
        </section>

        <div class="d-flex gap-2">
            <button class="btn btn-primary" type="submit"><i class="bi bi-check2-circle"></i> Guardar configuracion</button>
            <a class="btn btn-outline-secondary" th:href="@{/}"><i class="bi bi-x-lg"></i> Cancelar</a>
        </div>
    </form>
</main>
</body>
</html>
