<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Detalle Recepcion</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/app.css}" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>
<main class="container">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <div><h1 th:text="'Recepcion ' + ${recepcion.remito}">Recepcion</h1><div class="text-muted" th:text="'OC ' + ${orden.numero} + ' - ' + ${#temporals.format(recepcion.fecha, 'dd/MM/yyyy')}"></div></div>
        <a class="btn btn-outline-secondary" th:href="@{/materiales/oc/{id}(id=${orden.id})}">Volver</a>
    </div>
    <div class="table-responsive"><table class="table table-hover align-middle">
        <thead><tr><th>Item</th><th>Detalle</th><th>Unidad</th><th class="text-end">Cantidad recibida</th></tr></thead>
        <tbody>
        <tr th:each="item : ${recepcion.items}">
            <td th:text="${item.itemOrdenCompra.item}"></td>
            <td th:text="${item.itemOrdenCompra.detalle}"></td>
            <td th:text="${item.itemOrdenCompra.unidad}"></td>
            <td class="text-end" th:text="${item.cantidadRecibida}"></td>
        </tr>
        </tbody>
    </table></div>
</main>
</body>
</html>
