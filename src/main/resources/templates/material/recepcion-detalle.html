<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Detalle Entrega</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script>
    (() => {
        const savedTheme = localStorage.getItem('obraControl.theme');
        const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        document.documentElement.dataset.theme = savedTheme || (prefersDark ? 'dark' : 'light');
    })();
    </script>
    <link th:href="@{/css/app.css}" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>
<main class="container">
    <div class="page-navigation mb-3">
        <a th:href="@{/}"><i class="bi bi-house"></i> Inicio</a>
        <i class="bi bi-chevron-right"></i>
        <a th:href="@{/oc}">Ordenes</a>
        <i class="bi bi-chevron-right"></i>
        <a th:href="@{/oc/{id}(id=${orden.id})}" th:text="'OC ' + ${orden.numero}">OC</a>
        <i class="bi bi-chevron-right"></i>
        <a th:href="@{/materiales/oc/{id}(id=${orden.id})}">Entregas</a>
        <i class="bi bi-chevron-right"></i>
        <span th:text="${#strings.isEmpty(recepcion.remito) ? 'Entrega sin remito' : 'Entrega ' + recepcion.remito}">Entrega</span>
    </div>

    <div class="document-header mb-4">
        <div>
            <div class="document-kicker">Entrega / viaje</div>
            <h1 th:text="${#strings.isEmpty(recepcion.remito) ? 'Entrega sin remito' : 'Entrega ' + recepcion.remito}">Entrega</h1>
            <div class="text-muted" th:text="'OC ' + ${orden.numero} + ' - ' + ${#temporals.format(recepcion.fecha, 'dd/MM/yyyy')}"></div>
        </div>
    </div>
    <div class="table-responsive"><table class="table table-hover align-middle">
        <thead><tr><th>Item</th><th>Detalle</th><th>Unidad</th><th class="text-end">Cantidad recibida</th></tr></thead>
        <tbody>
        <tr th:each="item : ${recepcion.items}">
            <td th:text="${item.itemOrdenCompra.item}"></td>
            <td th:text="${item.itemOrdenCompra.detalle}"></td>
            <td th:text="${item.itemOrdenCompra.unidad}"></td>
            <td class="text-end" th:text="${item.cantidadRecibida}"></td>
        </tr>
        </tbody>
    </table></div>
</main>
</body>
</html>
