<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Nueva Recepcion</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script>
    (() => {
        const savedTheme = localStorage.getItem('obraControl.theme');
        const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        document.documentElement.dataset.theme = savedTheme || (prefersDark ? 'dark' : 'light');
    })();
    </script>
    <link th:href="@{/css/app.css}" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>
<main class="container">
    <div class="page-navigation mb-3">
        <a th:href="@{/}"><i class="bi bi-house"></i> Inicio</a>
        <i class="bi bi-chevron-right"></i>
        <a th:href="@{/oc}">Ordenes</a>
        <i class="bi bi-chevron-right"></i>
        <a th:href="@{/oc/{id}(id=${orden.id})}" th:text="'OC ' + ${orden.numero}">OC</a>
        <i class="bi bi-chevron-right"></i>
        <span>Nueva recepcion</span>
    </div>

    <div class="document-header mb-4">
        <div>
            <div class="document-kicker">Recepcion de entregas</div>
            <h1 th:text="'Nueva recepcion - OC ' + ${orden.numero}">Nueva recepcion</h1>
            <div class="text-muted">Carga remito, fecha y cantidades recibidas o viajes realizados.</div>
        </div>
    </div>
    <div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>
    <form method="post" th:action="@{/materiales/oc/{id}/recepciones(id=${orden.id})}" th:object="${form}">
        <div class="row g-3 mb-4">
            <div class="col-md-3"><label class="form-label">Fecha</label><input class="form-control" type="date" th:field="*{fecha}" required></div>
            <div class="col-md-3"><label class="form-label">Remito</label><input class="form-control" th:field="*{remito}" required></div>
            <div class="col-md-6"><label class="form-label">Observacion</label><input class="form-control" th:field="*{observacion}"></div>
        </div>
        <div class="table-responsive mb-4"><table class="table align-middle">
            <thead><tr><th>Item</th><th>Detalle</th><th class="text-end">Comprado</th><th class="text-end">Ya recibido</th><th class="text-end">Pendiente</th><th class="text-end">Recibido ahora</th></tr></thead>
            <tbody>
            <tr th:each="resumen, st : ${itemsResumen}">
                <td th:text="${resumen.itemOrdenCompra.item}"></td>
                <td th:text="${resumen.itemOrdenCompra.detalle}"></td>
                <td class="text-end" th:text="${resumen.cantidadComprada}"></td>
                <td class="text-end" th:text="${resumen.cantidadRecibida}"></td>
                <td class="text-end" th:text="${resumen.cantidadPendiente}"></td>
                <td>
                    <input type="hidden" th:field="*{items[__${st.index}__].itemOrdenCompraId}">
                    <input class="form-control text-end" type="number" step="0.01" min="0" th:max="${resumen.cantidadPendiente}" th:field="*{items[__${st.index}__].cantidadRecibida}">
                </td>
            </tr>
            </tbody>
        </table></div>
        <div class="d-flex gap-2"><button class="btn btn-primary" type="submit" th:disabled="${itemsResumen.isEmpty()}">Guardar</button><a class="btn btn-outline-secondary" th:href="@{/oc/{id}(id=${orden.id})}">Cancelar</a></div>
    </form>
</main>
</body>
</html>
