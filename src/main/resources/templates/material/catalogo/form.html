<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Material</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script>
    (() => {
        const savedTheme = localStorage.getItem('obraControl.theme');
        const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        document.documentElement.dataset.theme = savedTheme || (prefersDark ? 'dark' : 'light');
    })();
    </script>
    <link th:href="@{/css/app.css}" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>
<main class="container">
    <div class="page-navigation mb-3">
        <a th:href="@{/}"><i class="bi bi-house"></i> Inicio</a>
        <i class="bi bi-chevron-right"></i>
        <a th:href="@{/catalogo-materiales}">Catalogo de Materiales</a>
        <i class="bi bi-chevron-right"></i>
        <span th:text="${material.id == null ? 'Nuevo material' : 'Editar material'}">Material</span>
    </div>

    <div class="document-header mb-4">
        <div>
            <div class="document-kicker">Catalogo</div>
            <h1 th:text="${material.id == null ? 'Nuevo material' : 'Editar material'}">Material</h1>
            <div class="text-muted">Define nombre, unidad y estado del material catalogado.</div>
        </div>
    </div>
    <div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>
    <form method="post" th:action="@{/catalogo-materiales}" th:object="${material}">
        <input type="hidden" th:field="*{id}">
        <div class="row g-3 mb-4">
            <div class="col-md-5"><label class="form-label">Nombre</label><input class="form-control" th:field="*{nombre}" required></div>
            <div class="col-md-3"><label class="form-label">Unidad</label><input class="form-control" th:field="*{unidad}" placeholder="bolsa, m3, kg, u"></div>
            <div class="col-md-2"><label class="form-label">Activo</label><select class="form-select" th:field="*{activo}"><option value="true">Si</option><option value="false">No</option></select></div>
            <div class="col-12"><label class="form-label">Observacion</label><textarea class="form-control" rows="3" th:field="*{observacion}"></textarea></div>
        </div>
        <div class="d-flex gap-2"><button class="btn btn-primary" type="submit">Guardar</button><a class="btn btn-outline-secondary" th:href="@{/catalogo-materiales}">Cancelar</a></div>
    </form>
</main>
</body>
</html>
