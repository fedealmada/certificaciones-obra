<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Catalogo de Materiales</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/app.css}" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>
<main class="container">
    <div class="page-navigation mb-3">
        <a th:href="@{/}"><i class="bi bi-house"></i> Inicio</a>
        <i class="bi bi-chevron-right"></i>
        <span>Catalogo de Materiales</span>
    </div>

    <div class="page-hero mb-3">
        <div>
            <div class="document-kicker">Catalogo</div>
            <h1>Catalogo de Materiales</h1>
            <div class="text-muted">Materiales reutilizables para vincular a items de OC.</div>
        </div>
        <a class="btn btn-primary" th:href="@{/catalogo-materiales/nuevo}"><i class="bi bi-plus-lg"></i> Nuevo material</a>
    </div>
    <div class="table-responsive"><table class="table table-hover align-middle">
        <thead><tr><th>Nombre</th><th>Unidad</th><th>Observacion</th><th>Estado</th><th class="text-end">Acciones</th></tr></thead>
        <tbody>
        <tr th:each="material : ${materiales}">
            <td th:text="${material.nombre}"></td>
            <td th:text="${material.unidad}"></td>
            <td th:text="${material.observacion}"></td>
            <td><span class="status-pill" th:classappend="${material.activo ? ' status-done' : ' status-pending'}" th:text="${material.activo ? 'Activo' : 'Inactivo'}"></span></td>
            <td class="text-end action-cell">
                <a class="btn btn-sm btn-outline-secondary table-icon-action" th:href="@{/catalogo-materiales/{id}/editar(id=${material.id})}" title="Editar material" aria-label="Editar material"><i class="bi bi-pencil-square"></i></a>
                <form method="post" th:action="@{/catalogo-materiales/{id}/eliminar(id=${material.id})}" onsubmit="return confirm('¿Eliminar este material? Si tiene OC asociadas quedara inactivo.');">
                    <button class="btn btn-sm btn-outline-danger table-icon-action" type="submit" title="Eliminar material" aria-label="Eliminar material"><i class="bi bi-trash"></i></button>
                </form>
            </td>
        </tr>
        <tr th:if="${materiales.isEmpty()}"><td colspan="5" class="text-center text-muted py-4">No hay materiales cargados.</td></tr>
        </tbody>
    </table></div>
</main>
</body>
</html>
