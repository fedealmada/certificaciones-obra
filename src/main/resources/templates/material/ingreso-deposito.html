<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Ingreso a deposito</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script>
    (() => {
        const savedTheme = localStorage.getItem('obraControl.theme');
        const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        document.documentElement.dataset.theme = savedTheme || (prefersDark ? 'dark' : 'light');
    })();
    </script>
    <link th:href="@{/css/app.css}" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>
<main class="container">
    <div class="page-navigation mb-3">
        <a th:href="@{/}"><i class="bi bi-house"></i> Inicio</a>
        <i class="bi bi-chevron-right"></i>
        <a th:href="${desdeModuloEntregas ? '/materiales' : '/oc'}" th:text="${desdeModuloEntregas ? 'Entregas' : 'Ordenes'}">Entregas</a>
        <i class="bi bi-chevron-right"></i>
        <a th:href="@{/oc/{id}(id=${orden.id})}" th:text="'OC ' + ${orden.numero}">OC</a>
        <i class="bi bi-chevron-right"></i>
        <a th:href="@{/materiales/oc/{ocId}/recepciones/{id}(ocId=${orden.id}, id=${recepcion.id}, origen=${origen})}">Viaje</a>
        <i class="bi bi-chevron-right"></i>
        <span>Deposito</span>
    </div>

    <div class="document-header mb-4">
        <div>
            <div class="document-kicker">Ingreso al deposito</div>
            <h1 th:text="${itemRecepcion.itemOrdenCompra.detalle}">Material recibido</h1>
            <div class="text-muted" th:text="'OC ' + ${orden.numero} + ' / recibido ' + ${#numbers.formatDecimal(itemRecepcion.cantidadRecibida, 1, 'POINT', 2, 'COMMA')} + ' ' + (itemRecepcion.itemOrdenCompra.unidad ?: '')">OC</div>
        </div>
    </div>

    <div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>

    <form method="post"
          th:action="@{/materiales/oc/{ocId}/recepciones/{recepcionId}/items/{itemId}/deposito(ocId=${orden.id}, recepcionId=${recepcion.id}, itemId=${itemRecepcion.id}, origen=${origen})}"
          th:object="${form}">
        <section class="panel-section mb-3">
            <div class="section-title-row">
                <h2 class="h5 mb-0"><i class="bi bi-box-seam"></i> Destino en deposito</h2>
                <span class="section-total-pill" th:text="${itemRecepcion.itemOrdenCompra.unidad ?: 'unidad'}">unidad</span>
            </div>
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">Insumo existente</label>
                    <select class="form-select" th:field="*{depositoItemId}">
                        <option value="">Crear nuevo insumo</option>
                        <option th:each="insumo : ${insumosDeposito}"
                                th:value="${insumo.id}"
                                th:text="${insumo.nombre + ' / stock ' + #numbers.formatDecimal(insumo.stockActual, 1, 'POINT', 2, 'COMMA')}">
                            Insumo
                        </option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Cantidad a ingresar</label>
                    <input class="form-control" type="number" step="0.01" min="0.01" th:field="*{cantidad}" required>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Responsable</label>
                    <input class="form-control" th:field="*{responsable}" placeholder="Quien ingresa">
                </div>
            </div>
        </section>

        <section class="panel-section mb-3">
            <div class="section-title-row">
                <h2 class="h5 mb-0"><i class="bi bi-plus-square"></i> Nuevo insumo</h2>
                <span class="text-muted">Se usa solo si no elegis uno existente</span>
            </div>
            <div class="row g-3">
                <div class="col-md-5"><label class="form-label">Nombre</label><input class="form-control" th:field="*{nuevoInsumoNombre}"></div>
                <div class="col-md-3"><label class="form-label">Categoria</label><input class="form-control" th:field="*{categoria}" placeholder="Pintura, EPP, herramientas"></div>
                <div class="col-md-2"><label class="form-label">Ubicacion</label><input class="form-control" th:field="*{ubicacion}" placeholder="Estante A"></div>
                <div class="col-md-2"><label class="form-label">Stock minimo</label><input class="form-control" type="number" step="0.01" min="0" th:field="*{stockMinimo}"></div>
                <div class="col-12"><label class="form-label">Observacion</label><input class="form-control" th:field="*{observacion}" placeholder="Referencia del ingreso"></div>
            </div>
        </section>

        <div class="d-flex gap-2">
            <button class="btn btn-primary" type="submit"><i class="bi bi-box-arrow-in-down"></i> Ingresar al deposito</button>
            <a class="btn btn-outline-secondary" th:href="@{/materiales/oc/{ocId}/recepciones/{id}(ocId=${orden.id}, id=${recepcion.id}, origen=${origen})}">Cancelar</a>
        </div>
    </form>
</main>
</body>
</html>
