<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Materiales</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script>
    (() => {
        const savedTheme = localStorage.getItem('obraControl.theme');
        const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        document.documentElement.dataset.theme = savedTheme || (prefersDark ? 'dark' : 'light');
    })();
    </script>
    <link th:href="@{/css/app.css}" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>
<main class="container">
    <div class="page-navigation mb-3">
        <a th:href="@{/}"><i class="bi bi-house"></i> Inicio</a>
        <i class="bi bi-chevron-right"></i>
        <span>Materiales</span>
    </div>

    <div class="page-hero mb-3">
        <div>
            <div class="document-kicker">Recepciones</div>
            <h1>Materiales</h1>
            <div class="text-muted">Ordenes con items de materiales y control de recepcion.</div>
        </div>
    </div>
    <div class="table-responsive"><table class="table table-hover align-middle">
        <thead><tr><th>Numero OC</th><th>Fecha</th><th>Proveedor</th><th>Items</th><th class="text-end">Acciones</th></tr></thead>
        <tbody>
        <tr th:each="orden : ${ordenes}">
            <td th:text="${orden.numero}"></td>
            <td th:text="${#temporals.format(orden.fecha, 'dd/MM/yyyy')}"></td>
            <td th:text="${orden.proveedorEntidad?.nombre ?: '-'}"></td>
            <td th:text="${orden.items.size()}"></td>
            <td class="text-end"><a class="btn btn-sm btn-outline-primary table-icon-action" th:href="@{/materiales/oc/{id}(id=${orden.id})}" title="Abrir materiales" aria-label="Abrir materiales"><i class="bi bi-box-arrow-up-right"></i></a></td>
        </tr>
        <tr th:if="${ordenes.isEmpty()}"><td colspan="5" class="text-center text-muted py-4">No hay ordenes con materiales.</td></tr>
        </tbody>
    </table></div>
</main>
</body>
</html>
