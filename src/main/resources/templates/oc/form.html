<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Orden de Compra</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/app.css}" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>
<div class="work-action-overlay work-action-saving" id="oc-saving-overlay" aria-hidden="true">
    <div class="work-action-card">
        <div class="work-action-illustration work-action-illustration-yellow">
            <i class="bi bi-clipboard-check"></i>
        </div>
        <div class="work-action-kicker">Orden de compra</div>
        <h2>Guardando avance</h2>
        <p>Estamos dejando la OC prolija para continuar con la obra.</p>
        <div class="work-action-loader"><span></span></div>
    </div>
</div>
<main class="container oc-form-page">
    <h1 th:text="${form.id == null ? 'Nueva OC' : 'Editar OC'}">Orden de Compra</h1>
    <div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>
    <form method="post" th:action="@{/oc}" th:object="${form}" onsubmit="mostrarGuardandoOc()">
        <input type="hidden" th:field="*{id}">
        <div class="row g-3 mb-4">
            <div class="col-md-3"><label class="form-label">Numero</label><input class="form-control" th:field="*{numero}" required></div>
            <div class="col-md-3"><label class="form-label">Fecha</label><input class="form-control" type="date" th:field="*{fecha}" required></div>
            <div class="col-md-3"><label class="form-label">Fecha vigencia</label><input class="form-control" type="date" th:field="*{fechaVigencia}"></div>
            <div class="col-md-3"><label class="form-label">Proveedor</label><select class="form-select" th:field="*{proveedorId}" required><option value="">Seleccionar proveedor</option><option th:each="proveedor : ${proveedores}" th:value="${proveedor.id}" th:text="${proveedor.nombre}"></option></select></div>
            <div class="col-12"><label class="form-label">Observacion</label><textarea class="form-control" rows="2" th:field="*{observacion}"></textarea></div>
        </div>
        <div class="d-flex justify-content-between align-items-center mb-2"><h2 class="h4">Items</h2><button class="btn btn-outline-primary" type="button" onclick="agregarItem()">Agregar item</button></div>
        <select class="d-none" id="rubros-template">
            <option value="">Seleccionar</option>
            <option th:each="rubro : ${rubros}" th:value="${rubro.id}" th:text="${rubro.nombreCompleto}"></option>
        </select>
        <select class="d-none" id="mano-obra-template">
            <option value="">Sin vincular</option>
            <option th:each="mo : ${itemsManoObra}" th:value="${mo.id}" th:text="${'OC ' + mo.ordenCompra.numero + ' - ' + mo.detalle}"></option>
        </select>
        <select class="d-none" id="materiales-template">
            <option value="">Seleccionar material</option>
            <option th:each="material : ${catalogoMateriales}" th:value="${material.id}" th:data-unidad="${material.unidad}" th:text="${material.nombre}"></option>
        </select>
        <select class="d-none" id="categorias-template">
            <option th:each="cat : ${categorias}" th:value="${cat.id}" th:data-tipo="${cat.tipo}" th:text="${cat.nombre}"></option>
        </select>
        <div class="table-responsive mb-4 oc-form-table-wrap"><table class="table align-middle oc-form-table" id="items-table">
            <thead><tr><th>Item</th><th>Detalle</th><th>Unidad</th><th>Categoria</th><th class="material-only-column">Material</th><th>Rubro</th><th class="material-only-column">Vincular a Mano de Obra</th><th>Cantidad</th><th>Precio Unitario</th><th>Importe</th><th></th></tr></thead>
            <tbody>
            <tr th:each="item, st : *{items}" class="oc-item-row">
                <td><input type="hidden" th:field="*{items[__${st.index}__].id}"><input class="form-control" th:field="*{items[__${st.index}__].item}"></td>
                <td><input class="form-control detalle-input" th:field="*{items[__${st.index}__].detalle}"></td>
                <td><input class="form-control unidad-input" th:field="*{items[__${st.index}__].unidad}"></td>
                <td><div class="categoria-cell"><span class="categoria-badge"></span><select class="form-select categoria-select" th:field="*{items[__${st.index}__].categoriaId}" onchange="actualizarTipoItem(this)"><option th:each="cat : ${categorias}" th:value="${cat.id}" th:data-tipo="${cat.tipo}" th:text="${cat.nombre}"></option></select></div></td>
                <td class="material-only-column"><div class="material-catalogo-cell"><select class="form-select material-catalogo-select" th:field="*{items[__${st.index}__].materialCatalogoId}" onchange="aplicarMaterialCatalogo(this)"><option value="">Seleccionar material</option><option th:each="material : ${catalogoMateriales}" th:value="${material.id}" th:data-unidad="${material.unidad}" th:text="${material.nombre}"></option></select><span class="material-no-aplica">No aplica</span></div></td>
                <td><select class="form-select rubro-select" th:field="*{items[__${st.index}__].rubroId}" required><option value="">Seleccionar</option><option th:each="rubro : ${rubros}" th:value="${rubro.id}" th:text="${rubro.nombreCompleto}"></option></select></td>
                <td class="material-only-column"><div class="vinculo-material-cell"><select class="form-select mano-obra-select" th:field="*{items[__${st.index}__].itemManoObraVinculadoId}"><option value="">Sin vincular</option><option th:each="mo : ${itemsManoObra}" th:value="${mo.id}" th:text="${'OC ' + mo.ordenCompra.numero + ' - ' + mo.detalle}"></option></select><span class="mano-obra-sin-vinculo">No aplica para mano de obra</span></div></td>
                <td><input class="form-control cantidad-input" type="number" step="0.01" th:field="*{items[__${st.index}__].cantidad}" oninput="recalcularImporte(this)"></td>
                <td><input class="form-control precio-input" type="number" step="0.01" th:field="*{items[__${st.index}__].precioUnitario}" oninput="recalcularImporte(this)"></td>
                <td><input class="form-control importe-input" type="number" step="0.01" th:field="*{items[__${st.index}__].importe}" readonly></td>
                <td><button class="btn btn-sm btn-outline-danger oc-row-icon-button" type="button" onclick="eliminarItem(this)" title="Eliminar item"><i class="bi bi-trash"></i></button></td>
            </tr>
            </tbody>
        </table></div>
        <div class="oc-total-bar mb-3">
            <span>Total OC</span>
            <strong id="total-oc">0,00</strong>
        </div>
        <div class="d-flex gap-2"><button class="btn btn-primary" type="submit">Guardar</button><a class="btn btn-outline-secondary" th:href="@{/oc}">Cancelar</a></div>
    </form>
</main>
<script>
function agregarItem() {
    const tbody = document.querySelector('#items-table tbody');
    const index = tbody.children.length;
    const row = document.createElement('tr');
    row.innerHTML = `
        <td><input type="hidden" name="items[${index}].id"><input class="form-control" name="items[${index}].item"></td>
        <td><input class="form-control detalle-input" name="items[${index}].detalle"></td>
        <td><input class="form-control unidad-input" name="items[${index}].unidad"></td>
        <td><div class="categoria-cell"><span class="categoria-badge"></span><select class="form-select categoria-select" name="items[${index}].categoriaId" onchange="actualizarTipoItem(this)">${document.querySelector('#categorias-template').innerHTML}</select></div></td>
        <td class="material-only-column"><div class="material-catalogo-cell"><select class="form-select material-catalogo-select" name="items[${index}].materialCatalogoId" onchange="aplicarMaterialCatalogo(this)">${document.querySelector('#materiales-template').innerHTML}</select><span class="material-no-aplica">No aplica</span></div></td>
        <td><select class="form-select rubro-select" name="items[${index}].rubroId" required>${document.querySelector('#rubros-template').innerHTML}</select></td>
        <td class="material-only-column"><div class="vinculo-material-cell"><select class="form-select mano-obra-select" name="items[${index}].itemManoObraVinculadoId">${document.querySelector('#mano-obra-template').innerHTML}</select><span class="mano-obra-sin-vinculo">No aplica para mano de obra</span></div></td>
        <td><input class="form-control cantidad-input" type="number" step="0.01" name="items[${index}].cantidad" value="0" oninput="recalcularImporte(this)"></td>
        <td><input class="form-control precio-input" type="number" step="0.01" name="items[${index}].precioUnitario" value="0" oninput="recalcularImporte(this)"></td>
        <td><input class="form-control importe-input" type="number" step="0.01" name="items[${index}].importe" value="0.00" readonly></td>
        <td><button class="btn btn-sm btn-outline-danger oc-row-icon-button" type="button" onclick="eliminarItem(this)" title="Eliminar item"><i class="bi bi-trash"></i></button></td>`;
    tbody.appendChild(row);
    actualizarTipoItem(row.querySelector('.categoria-select'));
    recalcularTotalOc();
}

function eliminarItem(button) {
    if (!confirm('¿Eliminar este item de la orden de compra?')) {
        return;
    }
    button.closest('tr').remove();
    reindexarItems();
    actualizarColumnasMateriales();
    recalcularTotalOc();
}

function reindexarItems() {
    document.querySelectorAll('#items-table tbody tr').forEach((row, index) => {
        row.querySelectorAll('input, select').forEach(field => {
            if (field.name) {
                field.name = field.name.replace(/items\[\d+]/, `items[${index}]`);
            }
            if (field.id) {
                field.id = field.id.replace(/items\d+/, `items${index}`);
            }
        });
    });
}

function actualizarTipoItem(categoriaSelect) {
    const row = categoriaSelect.closest('tr');
    const manoObraSelect = row.querySelector('.mano-obra-select');
    const materialSelect = row.querySelector('.material-catalogo-select');
    const mensajeManoObra = row.querySelector('.mano-obra-sin-vinculo');
    const mensajeMaterial = row.querySelector('.material-no-aplica');
    const badge = row.querySelector('.categoria-badge');
    const selectedOption = categoriaSelect.selectedOptions[0];
    const tipo = selectedOption ? selectedOption.dataset.tipo : 'OTRO';
    const esMaterial = tipo === 'MATERIAL';
    const esManoObra = tipo === 'MANO_OBRA';
    const esOtro = tipo === 'OTRO';
    const usaCatalogo = esMaterial;

    row.classList.toggle('oc-item-material', esMaterial);
    row.classList.toggle('oc-item-mano-obra', esManoObra);
    row.classList.toggle('oc-item-servicio', esOtro);
    row.classList.toggle('oc-item-epp', false);

    badge.textContent = esMaterial ? 'MAT' : (esManoObra ? 'MO' : 'OTR');
    badge.classList.toggle('categoria-badge-material', esMaterial);
    badge.classList.toggle('categoria-badge-mano-obra', esManoObra);
    badge.classList.toggle('categoria-badge-servicio', esOtro);
    badge.classList.toggle('categoria-badge-epp', false);

    manoObraSelect.disabled = !esMaterial;
    manoObraSelect.classList.toggle('d-none', !esMaterial);
    mensajeManoObra.classList.toggle('d-none', esMaterial);
    materialSelect.disabled = !usaCatalogo;
    materialSelect.classList.toggle('d-none', !usaCatalogo);
    mensajeMaterial.classList.toggle('d-none', usaCatalogo);
    if (!esMaterial) {
        manoObraSelect.value = '';
    }
    if (!usaCatalogo) {
        materialSelect.value = '';
    }
    actualizarColumnasMateriales();
}

function actualizarColumnasMateriales() {
    const table = document.querySelector('#items-table');
    const tieneMateriales = Array.from(table.querySelectorAll('tbody tr'))
        .some(row => row.classList.contains('oc-item-material'));
    table.classList.toggle('has-material-items', tieneMateriales);
}

function aplicarMaterialCatalogo(materialSelect) {
    const selected = materialSelect.selectedOptions[0];
    if (!selected || !selected.value) {
        return;
    }
    const row = materialSelect.closest('tr');
    row.querySelector('.detalle-input').value = selected.textContent;
    const unidad = selected.dataset.unidad;
    if (unidad) {
        row.querySelector('.unidad-input').value = unidad;
    }
}

function numeroCampo(input) {
    const valor = Number.parseFloat(input.value);
    return Number.isFinite(valor) ? valor : 0;
}

function recalcularImporte(input) {
    const row = input.closest('tr');
    const cantidad = numeroCampo(row.querySelector('.cantidad-input'));
    const precio = numeroCampo(row.querySelector('.precio-input'));
    row.querySelector('.importe-input').value = (cantidad * precio).toFixed(2);
    recalcularTotalOc();
}

function recalcularTotalOc() {
    const total = Array.from(document.querySelectorAll('.importe-input'))
        .map(numeroCampo)
        .reduce((acumulado, importe) => acumulado + importe, 0);
    document.querySelector('#total-oc').textContent = total.toLocaleString('es-AR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function mostrarGuardandoOc() {
    const overlay = document.querySelector('#oc-saving-overlay');
    if (overlay) {
        overlay.classList.add('is-visible');
        overlay.setAttribute('aria-hidden', 'false');
    }
}

document.querySelectorAll('.categoria-select').forEach(actualizarTipoItem);
document.querySelectorAll('.material-catalogo-select').forEach(select => {
    if (select.value) {
        aplicarMaterialCatalogo(select);
    }
});
document.querySelectorAll('.cantidad-input, .precio-input').forEach(input => recalcularImporte(input));
actualizarColumnasMateriales();
recalcularTotalOc();

</script>
</body>
</html>
