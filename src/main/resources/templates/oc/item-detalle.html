<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Historial de Item</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/app.css}" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>
<main class="container">
    <div class="page-navigation mb-3">
        <a th:href="@{/}"><i class="bi bi-house"></i> Inicio</a>
        <i class="bi bi-chevron-right"></i>
        <a th:href="@{/oc}">Ordenes</a>
        <i class="bi bi-chevron-right"></i>
        <a th:href="@{/oc/{id}(id=${orden.id})}" th:text="'OC ' + ${orden.numero}">OC</a>
        <i class="bi bi-chevron-right"></i>
        <span th:text="'Item ' + ${item.item}">Item</span>
    </div>

    <div class="document-header oc-detail-header mb-4">
        <div class="document-title-block">
            <div class="document-kicker">Historial de item</div>
            <h1 th:text="'Item ' + ${item.item}">Item</h1>
            <div class="document-subtitle" th:text="'OC ' + ${orden.numero} + ' - ' + ${item.detalle}"></div>
        </div>
    </div>

    <div class="row g-3 mb-4">
        <div class="col-md-3"><div class="metric-card"><div class="metric-label">Importe</div><div class="metric-value metric-value-sm" th:text="${#numbers.formatDecimal(item.importe, 1, 'POINT', 2, 'COMMA')}">0,00</div></div></div>
        <div class="col-md-3"><div class="metric-card"><div class="metric-label">% acumulado</div><div class="metric-value metric-value-sm" th:text="${resumenItem.porcentajeAcumulado} + ' %'">0 %</div></div></div>
        <div class="col-md-3"><div class="metric-card"><div class="metric-label">Monto certificado</div><div class="metric-value metric-value-sm" th:text="${#numbers.formatDecimal(resumenItem.montoAcumulado, 1, 'POINT', 2, 'COMMA')}">0,00</div></div></div>
        <div class="col-md-3"><div class="metric-card"><div class="metric-label">Saldo</div><div class="metric-value metric-value-sm" th:text="${#numbers.formatDecimal(resumenItem.saldoPendiente, 1, 'POINT', 2, 'COMMA')}">0,00</div></div></div>
    </div>

    <div class="table-responsive"><table class="table table-hover align-middle">
        <thead><tr><th>Certificado</th><th>Fecha</th><th class="text-end">% anterior</th><th class="text-end">% actual</th><th class="text-end">% acumulado</th><th class="text-end">Monto actual</th><th class="text-end">Acciones</th></tr></thead>
        <tbody>
        <tr th:each="movimiento : ${historial}">
            <td th:text="${movimiento.numeroCertificacion}"></td>
            <td th:text="${#temporals.format(movimiento.fecha, 'dd/MM/yyyy')}"></td>
            <td class="text-end" th:text="${movimiento.porcentajeAnterior} + ' %'"></td>
            <td class="text-end" th:text="${movimiento.porcentajeActual} + ' %'"></td>
            <td class="text-end" th:text="${movimiento.porcentajeAcumulado} + ' %'"></td>
            <td class="text-end" th:text="${#numbers.formatDecimal(movimiento.montoActual, 1, 'POINT', 2, 'COMMA')}"></td>
            <td class="text-end"><a class="btn btn-sm btn-outline-primary table-icon-action" th:href="@{/oc/{ocId}/certificaciones/{certId}(ocId=${orden.id}, certId=${movimiento.certificacionId})}" title="Ver certificado" aria-label="Ver certificado"><i class="bi bi-eye"></i></a></td>
        </tr>
        <tr th:if="${historial.isEmpty()}"><td colspan="7" class="text-center text-muted py-4">Este item todavia no tiene certificaciones.</td></tr>
        </tbody>
    </table></div>
</main>
</body>
</html>
