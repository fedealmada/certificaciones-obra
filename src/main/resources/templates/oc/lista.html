<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Ordenes de Compra</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/app.css}" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>
<main class="container">
    <div class="page-navigation mb-3">
        <a th:href="@{/}"><i class="bi bi-house"></i> Inicio</a>
        <i class="bi bi-chevron-right"></i>
        <span>Ordenes</span>
    </div>

    <div class="page-hero mb-3">
        <div>
            <div class="document-kicker">Compras y contratos</div>
            <h1>Ordenes de Compra</h1>
            <div class="text-muted">Listado interactivo con busqueda y orden por columnas</div>
        </div>
        <div class="d-flex gap-2 flex-wrap">
            <a class="btn btn-outline-primary" th:if="${configuracion.activo('modulo.importarOc')}" th:href="@{/oc/importar}"><i class="bi bi-file-earmark-arrow-up"></i> Importar OC</a>
            <a class="btn btn-primary" th:href="@{/oc/nueva}"><i class="bi bi-plus-lg"></i> Nueva OC</a>
        </div>
    </div>

    <section class="panel-section mb-3">
        <form class="row g-2 align-items-end" method="get" th:action="@{/oc}" id="oc-filter-form">
            <div class="col-md-3">
                <label class="form-label">Proveedor</label>
                <input class="form-control live-filter" name="proveedor" th:value="${proveedor}" data-filter="proveedor" placeholder="Buscar proveedor">
            </div>
            <div class="col-md-3">
                <label class="form-label">Categoria</label>
                <select class="form-select live-filter" name="categoriaId" data-filter="categoria">
                    <option value="">Todas</option>
                    <option th:each="cat : ${categorias}" th:value="${cat.id}" th:text="${cat.nombre}" th:selected="${cat.id == categoriaSeleccionada}"></option>
                </select>
            </div>
            <div class="col-md-3">
                <label class="form-label">Rubro</label>
                <input class="form-control live-filter" name="rubro" th:value="${rubro}" data-filter="rubro" placeholder="Buscar rubro">
            </div>
            <div class="col-md-3 d-flex gap-2">
                <button class="btn btn-outline-primary" type="submit"><i class="bi bi-funnel"></i> Filtrar</button>
                <a class="btn btn-outline-secondary" th:href="@{/oc}"><i class="bi bi-x-lg"></i> Limpiar</a>
            </div>
        </form>
    </section>

    <section class="panel-section oc-list-panel">
        <div class="section-title-row">
            <h2 class="h5 mb-0"><i class="bi bi-receipt"></i> Ordenes cargadas</h2>
            <span class="section-total-pill"><span id="oc-visible-count" th:text="${ordenes.size()}">0</span> visibles</span>
        </div>
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0 interactive-table oc-list-table" id="oc-table" data-no-resize="true">
                <colgroup>
                    <col class="oc-col-numero">
                    <col class="oc-col-fecha">
                    <col class="oc-col-proveedor">
                    <col class="oc-col-categorias">
                    <col class="oc-col-rubros">
                    <col class="oc-col-items">
                    <col class="oc-col-certificados">
                    <col class="oc-col-acciones">
                </colgroup>
                <thead>
                <tr>
                    <th><button class="table-sort-button" type="button" data-sort="numero" data-type="number">OC <i class="bi bi-arrow-down-up"></i></button></th>
                    <th><button class="table-sort-button" type="button" data-sort="fecha" data-type="date">Fecha <i class="bi bi-arrow-down-up"></i></button></th>
                    <th><button class="table-sort-button" type="button" data-sort="proveedor" data-type="text">Proveedor <i class="bi bi-arrow-down-up"></i></button></th>
                    <th><button class="table-sort-button" type="button" data-sort="categorias" data-type="text">Categorias <i class="bi bi-arrow-down-up"></i></button></th>
                    <th><button class="table-sort-button" type="button" data-sort="rubros" data-type="text">Rubros <i class="bi bi-arrow-down-up"></i></button></th>
                    <th class="text-end"><button class="table-sort-button justify-content-end" type="button" data-sort="items" data-type="number">Items <i class="bi bi-arrow-down-up"></i></button></th>
                    <th class="text-end"><button class="table-sort-button justify-content-end" type="button" data-sort="certificados" data-type="number">Certif. <i class="bi bi-arrow-down-up"></i></button></th>
                    <th class="text-end">Acciones</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="orden : ${ordenes}"
                    class="clickable-table-row"
                    tabindex="0"
                    th:data-href="@{/oc/{id}(id=${orden.id})}"
                    th:data-numero="${orden.numero}"
                    th:data-fecha="${orden.fecha}"
                    th:data-proveedor="${orden.proveedorEntidad?.nombre ?: '-'}"
                    th:data-categorias="${#strings.listJoin(orden.items.![categoriaEntidad != null ? categoriaEntidad.nombre : categoria.descripcion], ' ')}"
                    th:data-rubros="${#strings.listJoin(orden.items.![rubro ?: ''], ' ')}"
                    th:data-items="${orden.items.size()}"
                    th:data-certificados="${certificadosPorOrden.getOrDefault(orden.id, 0)}">
                    <td><span class="item-code-pill" th:text="${orden.numero}"></span></td>
                    <td th:text="${#temporals.format(orden.fecha, 'dd/MM/yyyy')}"></td>
                    <td th:text="${orden.proveedorEntidad?.nombre ?: '-'}"></td>
                    <td><span class="category-chip" th:text="${orden.items.isEmpty() ? '-' : #strings.listJoin(#sets.toSet(orden.items.![categoriaEntidad != null ? categoriaEntidad.nombre : categoria.descripcion]), ', ')}"></span></td>
                    <td class="oc-list-rubros" th:text="${orden.items.isEmpty() ? '-' : #strings.listJoin(#sets.toSet(orden.items.![rubro ?: '']), ', ')}"></td>
                    <td class="text-end" th:text="${orden.items.size()}"></td>
                    <td class="text-end">
                        <a class="cert-count-pill" th:classappend="${certificadosPorOrden.getOrDefault(orden.id, 0) == 0 ? ' is-empty' : ''}" th:href="@{/oc/{id}(id=${orden.id})} + '#certificados'" th:text="${certificadosPorOrden.getOrDefault(orden.id, 0) == 1 ? '1 certificado' : certificadosPorOrden.getOrDefault(orden.id, 0) + ' certificados'}">0 certificados</a>
                    </td>
                    <td class="text-end action-cell">
                        <a class="btn btn-sm btn-outline-secondary table-icon-action" th:href="@{/oc/{id}/editar(id=${orden.id})}" title="Editar OC" aria-label="Editar OC"><i class="bi bi-pencil-square"></i></a>
                        <form method="post" th:action="@{/oc/{id}/eliminar(id=${orden.id})}" onsubmit="return confirm('Eliminar esta orden de compra? Se eliminaran tambien sus certificados.');">
                            <button class="btn btn-sm btn-outline-danger table-icon-action" type="submit" title="Eliminar OC" aria-label="Eliminar OC"><i class="bi bi-trash"></i></button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${ordenes.isEmpty()}"><td colspan="8" class="text-center text-muted py-4">No hay ordenes cargadas.</td></tr>
                <tr class="oc-empty-filter-row d-none"><td colspan="8" class="text-center text-muted py-4">No hay ordenes que coincidan con la busqueda.</td></tr>
                </tbody>
            </table>
        </div>
    </section>
</main>
<script>
const ocTable = document.querySelector('#oc-table');
const ocRows = Array.from(ocTable.querySelectorAll('tbody tr[data-numero]'));
const visibleCount = document.querySelector('#oc-visible-count');
const emptyFilterRow = document.querySelector('.oc-empty-filter-row');
let currentSort = { key: 'fecha', direction: 'desc', type: 'date' };

function normalizeText(value) {
    return (value || '').toString().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').trim();
}

function numberValue(value) {
    const normalized = (value || '').toString().replace(/[^\d.,-]/g, '').replace(',', '.');
    const parsed = Number.parseFloat(normalized);
    return Number.isFinite(parsed) ? parsed : 0;
}

function sortValue(row, key, type) {
    const value = row.dataset[key] || '';
    if (type === 'number') {
        return numberValue(value);
    }
    if (type === 'date') {
        return value;
    }
    return normalizeText(value);
}

function applyFilters() {
    const proveedor = normalizeText(document.querySelector('[data-filter="proveedor"]').value);
    const rubro = normalizeText(document.querySelector('[data-filter="rubro"]').value);
    const categoriaSelect = document.querySelector('[data-filter="categoria"]');
    const categoria = normalizeText(categoriaSelect.selectedOptions[0]?.textContent || '');
    const filtraCategoria = categoriaSelect.value !== '';
    let visibles = 0;

    ocRows.forEach(row => {
        const matchesProveedor = normalizeText(row.dataset.proveedor).includes(proveedor);
        const matchesRubro = normalizeText(row.dataset.rubros).includes(rubro);
        const matchesCategoria = !filtraCategoria || normalizeText(row.dataset.categorias).includes(categoria);
        const visible = matchesProveedor && matchesRubro && matchesCategoria;
        row.classList.toggle('d-none', !visible);
        if (visible) {
            visibles++;
        }
    });

    visibleCount.textContent = visibles;
    emptyFilterRow.classList.toggle('d-none', visibles !== 0);
}

function applySort(key, type, toggleDirection) {
    const direction = toggleDirection && currentSort.key === key && currentSort.direction === 'asc' ? 'desc' : 'asc';
    currentSort = { key, direction, type };
    const body = ocTable.querySelector('tbody');
    const sortedRows = [...ocRows].sort((a, b) => {
        const left = sortValue(a, key, type);
        const right = sortValue(b, key, type);
        const comparison = type === 'text' ? left.localeCompare(right, 'es') : (left > right ? 1 : (left < right ? -1 : 0));
        return direction === 'asc' ? comparison : -comparison;
    });

    sortedRows.forEach(row => body.appendChild(row));
    body.appendChild(emptyFilterRow);

    document.querySelectorAll('.table-sort-button').forEach(button => {
        const active = button.dataset.sort === key;
        button.classList.toggle('is-active', active);
        const icon = button.querySelector('i');
        icon.className = active
            ? (direction === 'asc' ? 'bi bi-sort-up' : 'bi bi-sort-down')
            : 'bi bi-arrow-down-up';
    });
}

document.querySelectorAll('.live-filter').forEach(field => {
    field.addEventListener('input', applyFilters);
    field.addEventListener('change', applyFilters);
});

document.querySelectorAll('.table-sort-button').forEach(button => {
    button.addEventListener('click', () => applySort(button.dataset.sort, button.dataset.type, true));
});

ocRows.forEach(row => {
    row.addEventListener('click', event => {
        if (event.target.closest('a, button, input, select, textarea, form, .column-resize-handle')) {
            return;
        }
        window.location.href = row.dataset.href;
    });
    row.addEventListener('keydown', event => {
        if ((event.key === 'Enter' || event.key === ' ') && !event.target.closest('a, button, input, select, textarea, form')) {
            event.preventDefault();
            window.location.href = row.dataset.href;
        }
    });
});

applySort(currentSort.key, currentSort.type, false);
applyFilters();
</script>
</body>
</html>
