<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${modoEdicion ? 'Editar Certificado' : 'Nuevo Certificado'}">Certificado</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/app.css}" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>
<main class="container">
    <h1 th:text="${modoEdicion ? 'Editar Certificado - OC ' + orden.numero : 'Nuevo Certificado - OC ' + orden.numero}">Certificado</h1>
    <div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>
    <form method="post" th:action="${modoEdicion ? ('/oc/' + orden.id + '/certificaciones/' + certificacionId) : ('/oc/' + orden.id + '/certificaciones')}" th:object="${form}">
        <input type="hidden" th:field="*{id}">
        <div class="row g-3 mb-4">
            <div class="col-md-3"><label class="form-label">Numero</label><input class="form-control" type="number" th:field="*{numero}" required></div>
            <div class="col-md-3"><label class="form-label">Fecha</label><input class="form-control" type="date" th:field="*{fecha}" required></div>
            <div class="col-md-6"><label class="form-label">Observacion</label><input class="form-control" th:field="*{observacion}"></div>
        </div>
        <div class="table-responsive mb-3"><table class="table align-middle" id="certificacion-table">
            <thead>
            <tr>
                <th>Item</th>
                <th>Detalle</th>
                <th class="text-end">Importe</th>
                <th class="text-end">% anterior</th>
                <th class="text-end">% actual</th>
                <th class="text-end">% acumulado</th>
                <th class="text-end">Monto actual</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="vista, st : ${itemsCertificables}"
                th:attr="data-importe=${vista.itemOrdenCompra.importe},data-anterior=${vista.porcentajeAnterior},data-pendiente=${vista.porcentajePendiente}">
                <td th:text="${vista.itemOrdenCompra.item}"></td>
                <td>
                    <div th:text="${vista.itemOrdenCompra.detalle}"></div>
                    <small class="text-muted" th:if="${vista.porcentajePendiente == 0}">Sin margen para certificar</small>
                    <small class="text-muted" th:if="${vista.porcentajePendiente > 0}" th:text="'Maximo editable: ' + ${vista.porcentajePendiente} + ' %'"></small>
                </td>
                <td class="text-end" th:text="${#numbers.formatDecimal(vista.itemOrdenCompra.importe, 1, 'POINT', 2, 'COMMA')}"></td>
                <td class="text-end" th:text="${vista.porcentajeAnterior} + ' %'"></td>
                <td class="w-25">
                    <input type="hidden" th:field="*{items[__${st.index}__].itemOrdenCompraId}">
                    <input class="form-control text-end porcentaje-input" type="number" step="0.01" min="0"
                           th:max="${vista.porcentajePendiente}"
                           th:readonly="${vista.porcentajePendiente == 0}"
                           th:field="*{items[__${st.index}__].porcentajeActual}">
                </td>
                <td class="text-end"><span class="acumulado-estimado" th:text="${vista.porcentajeAnterior + vista.porcentajeActual} + ' %'"></span></td>
                <td class="text-end"><span class="monto-estimado">0,00</span></td>
            </tr>
            <tr th:if="${itemsCertificables.isEmpty()}"><td colspan="7" class="text-center text-muted py-4">Esta OC no tiene items de mano de obra.</td></tr>
            </tbody>
        </table></div>
        <div class="cert-summary mb-4">
            <div><span class="text-muted">Total certificado actual</span><strong id="total-actual">0,00</strong></div>
            <div><span class="text-muted">Items a certificar</span><strong id="items-con-avance">0</strong></div>
        </div>
        <div class="d-flex gap-2"><button class="btn btn-primary" type="submit" th:disabled="${itemsCertificables.isEmpty()}" th:text="${modoEdicion ? 'Guardar cambios' : 'Guardar'}">Guardar</button><a class="btn btn-outline-secondary" th:href="@{/oc/{id}(id=${orden.id})}">Cancelar</a></div>
    </form>
</main>
<script>
const moneyFormatter = new Intl.NumberFormat('es-AR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });

function toNumber(value) {
    const normalized = String(value || '0').replace(',', '.');
    const number = Number(normalized);
    return Number.isFinite(number) ? number : 0;
}

function recalcularCertificado() {
    let totalActual = 0;
    let itemsConAvance = 0;

    document.querySelectorAll('#certificacion-table tbody tr[data-importe]').forEach(row => {
        const importe = toNumber(row.dataset.importe);
        const anterior = toNumber(row.dataset.anterior);
        const pendiente = toNumber(row.dataset.pendiente);
        const input = row.querySelector('.porcentaje-input');
        let actual = toNumber(input.value);

        if (actual < 0) {
            actual = 0;
            input.value = 0;
        }
        if (actual > pendiente) {
            actual = pendiente;
            input.value = pendiente;
        }

        const acumulado = anterior + actual;
        const montoActual = importe * actual / 100;
        row.querySelector('.acumulado-estimado').textContent = `${moneyFormatter.format(acumulado)} %`;
        row.querySelector('.monto-estimado').textContent = moneyFormatter.format(montoActual);

        totalActual += montoActual;
        if (actual > 0) {
            itemsConAvance += 1;
        }
    });

    document.querySelector('#total-actual').textContent = moneyFormatter.format(totalActual);
    document.querySelector('#items-con-avance').textContent = itemsConAvance;
}

document.querySelectorAll('.porcentaje-input').forEach(input => input.addEventListener('input', recalcularCertificado));
recalcularCertificado();
</script>
</body>
</html>
