<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<body>
<nav th:fragment="navbar" class="app-topbar app-sidebar" aria-label="Navegacion principal">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <script>
    (() => {
        if (document.documentElement.dataset.theme) {
            return;
        }
        const savedTheme = localStorage.getItem('obraControl.theme');
        const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        const theme = savedTheme || (prefersDark ? 'dark' : 'light');
        document.documentElement.dataset.theme = theme;
    })();
    </script>
    <div class="app-nav-container">
        <a class="app-brand" th:href="@{/}" title="Inicio">
            <span class="app-brand-mark"><i class="bi bi-building-check"></i></span>
            <span class="app-brand-text">ObraControl</span>
        </a>
        <div class="app-nav-links">
            <a class="nav-link" th:href="@{/}" title="Inicio"><i class="bi bi-house"></i><span>Inicio</span></a>
            <a class="nav-link" th:if="${configuracion.activo('modulo.dashboard')}" th:href="@{/dashboard}" title="Dashboard"><i class="bi bi-grid-1x2"></i><span>Dashboard</span></a>
            <div class="app-nav-section"><span>Administracion</span></div>
            <a class="nav-link" th:if="${configuracion.activo('modulo.oc')}" th:href="@{/oc}" title="Ordenes"><i class="bi bi-receipt"></i><span>Ordenes</span></a>
            <a class="nav-link" th:if="${configuracion.activo('modulo.importarOc')}" th:href="@{/oc/importar}" title="Importar OC"><i class="bi bi-file-earmark-arrow-up"></i><span>Importar OC</span></a>
            <a class="nav-link" th:if="${configuracion.activo('modulo.importarCertificados')}" th:href="@{/certificaciones/importar}" title="Certificados"><i class="bi bi-clipboard-check"></i><span>Certificados</span></a>
            <a class="nav-link" th:if="${configuracion.activo('modulo.proveedores')}" th:href="@{/proveedores}" title="Proveedores"><i class="bi bi-people"></i><span>Proveedores</span></a>
            <a class="nav-link" th:if="${configuracion.activo('modulo.reportes')}" th:href="@{/reportes}" title="Reportes"><i class="bi bi-bar-chart"></i><span>Reportes</span></a>
            <div class="app-nav-section"><span>Obra</span></div>
            <a class="nav-link" th:if="${configuracion.activo('modulo.itemizado')}" th:href="@{/itemizado}" title="Itemizado"><i class="bi bi-diagram-3"></i><span>Itemizado</span></a>
            <a class="nav-link" th:if="${configuracion.activo('modulo.items')}" th:href="@{/items}" title="Items"><i class="bi bi-list-task"></i><span>Items</span></a>
            <a class="nav-link" th:if="${configuracion.activo('modulo.materiales')}" th:href="@{/materiales}" title="Entregas"><i class="bi bi-truck"></i><span>Entregas</span></a>
            <div class="app-nav-section"><span>Panol</span></div>
            <a class="nav-link" th:if="${configuracion.activo('modulo.deposito')}" th:href="@{/deposito}" title="Deposito"><i class="bi bi-boxes"></i><span>Deposito</span></a>
            <a class="nav-link" th:if="${configuracion.activo('modulo.deposito')}" th:href="@{/deposito/personas}" title="Personas"><i class="bi bi-person-badge"></i><span>Personas</span></a>
            <a class="nav-link" th:if="${configuracion.activo('modulo.catalogo')}" th:href="@{/catalogo-materiales}" title="Catalogo"><i class="bi bi-archive"></i><span>Catalogo</span></a>
            <div class="app-nav-section"><span>Config.</span></div>
            <a class="nav-link" th:if="${configuracion.activo('modulo.categorias')}" th:href="@{/categorias}" title="Categorias"><i class="bi bi-tags"></i><span>Categorias</span></a>
            <a class="nav-link" th:if="${configuracion.activo('modulo.rubros')}" th:href="@{/rubros}" title="Rubros"><i class="bi bi-folder2-open"></i><span>Rubros</span></a>
            <a class="nav-link" th:href="@{/configuracion}" title="Configuracion"><i class="bi bi-gear"></i><span>Configuracion</span></a>
            <button class="nav-link theme-toggle-button" type="button" title="Modo oscuro" aria-label="Cambiar modo oscuro">
                <i class="bi bi-moon-stars"></i><span>Modo oscuro</span>
            </button>
        </div>
    </div>
    <script>
    (() => {
        const sidebar = document.currentScript.closest('.app-sidebar');
        const button = document.querySelector('.theme-toggle-button');
        const icon = button?.querySelector('i');

        if (sidebar) {
            let closeTimer;

            const openSidebar = () => {
                window.clearTimeout(closeTimer);
                sidebar.classList.add('is-open');
                sidebar.classList.remove('is-closing');
            };
            const closeSidebar = () => {
                window.clearTimeout(closeTimer);
                sidebar.classList.add('is-closing');
                sidebar.classList.remove('is-open');
                closeTimer = window.setTimeout(() => {
                    sidebar.classList.remove('is-closing');
                }, 1650);
            };

            sidebar.addEventListener('pointerenter', openSidebar);
            sidebar.addEventListener('pointerleave', event => {
                if (event.relatedTarget && sidebar.contains(event.relatedTarget)) {
                    return;
                }
                closeSidebar();
            });
            sidebar.addEventListener('click', event => {
                openSidebar();
                if (event.target.closest('a')) {
                    document.body.classList.add('is-page-leaving');
                }
            });
        }

        function setTheme(theme) {
            document.documentElement.dataset.theme = theme;
            localStorage.setItem('obraControl.theme', theme);
            if (icon) {
                icon.className = theme === 'dark' ? 'bi bi-sun' : 'bi bi-moon-stars';
            }
            if (button) {
                button.title = theme === 'dark' ? 'Modo claro' : 'Modo oscuro';
                button.setAttribute('aria-label', button.title);
            }
        }

        setTheme(document.documentElement.dataset.theme || 'light');
        button?.addEventListener('click', () => {
            setTheme(document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark');
        });
    })();
    </script>
</nav>
</body>
</html>
