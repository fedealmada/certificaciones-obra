<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<body>
<nav th:fragment="navbar" class="navbar navbar-expand-lg app-topbar mb-4">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <div class="container app-nav-container">
        <a class="navbar-brand app-brand" th:href="@{/}">
            <span class="app-brand-mark"><i class="bi bi-building-check"></i></span>
            <span>ObraControl</span>
        </a>
        <div class="navbar-nav app-nav-links">
            <a class="nav-link" th:href="@{/}"><i class="bi bi-house"></i><span>Inicio</span></a>
            <a class="nav-link" th:if="${configuracion.activo('modulo.dashboard')}" th:href="@{/dashboard}"><i class="bi bi-speedometer2"></i><span>Dashboard</span></a>

            <a class="nav-link" th:if="${configuracion.activo('modulo.importarOc')}" th:href="@{/oc/importar}"><i class="bi bi-file-earmark-arrow-up"></i><span>Importar OC</span></a>
            <a class="nav-link" th:if="${configuracion.activo('modulo.items')}" th:href="@{/items}"><i class="bi bi-list-task"></i><span>Items</span></a>
