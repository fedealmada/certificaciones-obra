<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Ingresar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <script>
    (() => {
        const savedTheme = localStorage.getItem('obraControl.theme');
        const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        document.documentElement.dataset.theme = savedTheme || (prefersDark ? 'dark' : 'light');
    })();
    </script>
    <link th:href="@{/css/app.css}" rel="stylesheet">
</head>
<body class="login-body">
<main class="login-shell">
    <section class="login-panel">
        <div class="login-brand">
            <span><i class="bi bi-building-check"></i></span>
            <div>
                <strong>ObraControl</strong>
                <small>Acceso seguro al sistema</small>
            </div>
        </div>
        <div class="alert alert-danger" th:if="${param.error}">Usuario o contrasena incorrectos.</div>
        <div class="alert alert-success" th:if="${param.logout}">Sesion cerrada correctamente.</div>
        <form method="post" th:action="@{/login}">
            <label class="form-label">Usuario</label>
            <input class="form-control" name="username" autocomplete="username" autofocus required>
            <label class="form-label mt-3">Contrasena</label>
            <input class="form-control" type="password" name="password" autocomplete="current-password" required>
            <button class="btn btn-primary w-100 mt-4" type="submit"><i class="bi bi-box-arrow-in-right"></i> Ingresar</button>
        </form>
        <p class="login-help">Por defecto en desarrollo: admin / admin. Cambialo con APP_USER y APP_PASSWORD.</p>
    </section>
</main>
</body>
</html>
