<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Registro de asistencia</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script>
    (() => {
        const savedTheme = localStorage.getItem('obraControl.theme');
        const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        document.documentElement.dataset.theme = savedTheme || (prefersDark ? 'dark' : 'light');
    })();
    </script>
    <link th:href="@{/css/app.css}" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>
<main class="container">
    <div class="page-navigation mb-3">
        <a th:href="@{/}"><i class="bi bi-house"></i> Inicio</a>
        <i class="bi bi-chevron-right"></i>
        <a th:href="@{/asistencia(fecha=${form.fecha})}">Asistencia</a>
        <i class="bi bi-chevron-right"></i>
        <span th:text="${modoEdicion ? 'Editar' : 'Nueva'}">Nueva</span>
    </div>

    <div class="document-header mb-4">
        <div>
            <div class="document-kicker">Personal de obra</div>
            <h1 th:text="${modoEdicion ? 'Editar asistencia' : 'Registrar asistencia'}">Registrar asistencia</h1>
            <div class="text-muted">Carga la persona, empresa, horario y horas trabajadas.</div>
        </div>
    </div>

    <div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>

    <form method="post" th:action="@{/asistencia}" th:object="${form}">
        <input type="hidden" th:field="*{id}">
        <section class="panel-section">
            <div class="row g-3">
                <div class="col-md-3">
                    <label class="form-label">Fecha</label>
                    <input class="form-control" type="date" th:field="*{fecha}" required>
                </div>
                <div class="col-md-5">
                    <label class="form-label">Persona</label>
                    <input class="form-control" th:field="*{trabajadorNombre}" list="asistencia-personas" placeholder="Ej: Juan Carlos" required>
                    <datalist id="asistencia-personas">
                        <option th:each="persona : ${personas}" th:value="${persona.nombre}" th:attr="data-empresa=${persona.empresa},data-sector=${persona.sector}"></option>
                    </datalist>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Empresa</label>
                    <input class="form-control" th:field="*{empresa}" placeholder="Empresa contratista">
                </div>
                <div class="col-md-4">
                    <label class="form-label">Sector / funcion</label>
                    <input class="form-control" th:field="*{sector}" placeholder="Pintura, electricidad, limpieza">
                </div>
                <div class="col-md-2">
                    <label class="form-label">Ingreso</label>
                    <input class="form-control" type="time" th:field="*{horaIngreso}">
                </div>
                <div class="col-md-2">
                    <label class="form-label">Salida</label>
                    <input class="form-control" type="time" th:field="*{horaSalida}">
                </div>
                <div class="col-md-2">
                    <label class="form-label">Horas</label>
                    <input class="form-control" type="number" step="0.01" min="0" th:field="*{horasTrabajadas}" placeholder="Auto">
                </div>
                <div class="col-md-12">
                    <label class="form-label">Observacion</label>
                    <input class="form-control" th:field="*{observacion}" placeholder="Llegada tarde, media jornada, tarea realizada">
                </div>
            </div>
        </section>
        <div class="d-flex gap-2 mt-3">
            <button class="btn btn-primary" type="submit"><i class="bi bi-save"></i> Guardar</button>
            <a class="btn btn-outline-secondary" th:href="@{/asistencia(fecha=${form.fecha})}">Cancelar</a>
        </div>
    </form>
</main>
<script>
const personaInput = document.querySelector('[name="trabajadorNombre"]');
const empresaInput = document.querySelector('[name="empresa"]');
const sectorInput = document.querySelector('[name="sector"]');
const opciones = Array.from(document.querySelectorAll('#asistencia-personas option'));

personaInput?.addEventListener('change', () => {
    const opcion = opciones.find(item => item.value.toLowerCase() === personaInput.value.toLowerCase());
    if (!opcion) {
        return;
    }
    if (!empresaInput.value && opcion.dataset.empresa) {
        empresaInput.value = opcion.dataset.empresa;
    }
    if (!sectorInput.value && opcion.dataset.sector) {
        sectorInput.value = opcion.dataset.sector;
    }
});
</script>
</body>
</html>
